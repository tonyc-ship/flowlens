# Xiaohongshu (小红书) Site Knowledge
# Extracted from flowlens/platforms/xhs/ hardcoded logic
# This file is loaded into the agent's system prompt when browsing xiaohongshu.com

site:
  name: "Xiaohongshu (小红书)"
  domain: "xiaohongshu.com"
  domain_aliases: ["xhslink.com"]
  description: |
    Xiaohongshu is a Chinese social media platform focused on lifestyle content.
    Users publish "notes" (笔记) which can be image carousels or short videos,
    accompanied by text descriptions, hashtags, and comments. The platform is
    popular for product reviews, travel guides, fashion, food, and lifestyle tips.
    Content is primarily in Chinese.
  language: "zh-CN"

anti_bot:
  general_advice: |
    Xiaohongshu has aggressive anti-bot detection. Always behave like a human:
    - Add random delays (2-8 seconds) between actions
    - Never navigate directly to /explore/{note_id} URLs — always open notes by
      clicking cards on search results or profile pages (modal overlay)
    - Close note detail modals via Escape key or X button, NOT by reloading the page
    - If you see anti-bot signals, stop all actions for 30+ seconds before retrying
    - Avoid rapid consecutive page navigations
  rules:
    - signal: "Page shows '请扫码在手机上查看' (scan QR to view on phone)"
      action: "Stop immediately. This is an anti-bot block. Wait 60 seconds, then try a different approach."
    - signal: "Page shows 'The page isn't available right now' or error_page state"
      action: "Anti-bot triggered. Do NOT retry the same URL. Go back and try opening from a card click."
    - signal: "Security verification / captcha appears"
      action: "Stop all automated actions for at least 30 seconds. The user may need to solve manually."
    - signal: "Direct URL navigation returns blank or 404"
      action: "This is normal anti-bot behavior. Always open notes via card clicks from search/profile pages."

pages:
  homepage:
    name: "Homepage (首页)"
    url_pattern: "xiaohongshu.com/$"
    description: |
      Grid of recommended note cards. Left sidebar with navigation
      (首页/发现/发布/通知/我). Search bar at top center. XHS red logo top-left.
    navigation_tips:
      - "PREFERRED: use run_site_action(action='search_notes', query='...') directly from the homepage"
      - "For topic research, PREFERRED: call run_site_action(action='search_notes', query='...') and/or extract_site_entity(entity_type='search_cards') first, then open the most relevant notes one by one"
      - "If the next step is obvious, you can use run_site_action(action='search_notes', query='...') to search and get visible cards in one call"
      - "The search bar is an input#search-input with placeholder '搜索小红书', typically at the top center of the page"
      - "Use extract_page_data(command='submit_search_query', params={keyword: '...'}) only as a low-level fallback"
      - "Click any note card to open it as a modal overlay"

  search_results:
    name: "Search Results (搜索结果)"
    url_pattern: "xiaohongshu.com/search_result"
    description: |
      Search query in search bar, filter tabs (全部/图文/视频/用户),
      waterfall grid of matching note cards. Each card shows: cover image,
      title, author name, like count.
    navigation_tips:
      - "For topic research, PREFERRED: inspect visible cards with run_site_action(action='search_notes', ...) or extract_site_entity(entity_type='search_cards') before opening notes"
      - "PREFERRED: after choosing a card, call run_site_action(action='read_note', index=N, level='lite|deep')"
      - "Click filter tabs to switch between 全部(all), 图文(images), 视频(video), 用户(users)"
      - "Click a note card to open it as a modal overlay on top of search results"
      - "Scroll down to load more results (infinite scroll)"
      - "PREFERRED for a new query: use run_site_action(action='search_notes', query='...')"
      - "Use extract_page_data(command='submit_search_query', params={keyword: '...'}) only as a low-level fallback when site actions are unavailable"
    available_extractors:
      - "extract_search_cards — returns all visible note cards with title, author, likes, note_id"
      - "extract_search_tabs — returns available filter tab names and which is active"
      - "extract_site_entity(entity_type='search_cards') — normalized card objects for agent ranking"
      - "run_site_action(action='read_note', index=N, level='lite|deep') — open a card and extract note info in one call"
    search_url_template: "https://www.xiaohongshu.com/search_result?keyword={encoded_keyword}&source=web_search_result_notes"

  note_detail:
    name: "Note Detail (笔记详情)"
    url_pattern: "xiaohongshu.com/explore/"
    description: |
      Note detail appears in two forms:
      1. Modal overlay (most common): dark semi-transparent background, white modal.
         Left panel = image carousel or video. Right panel = author info + text content
         + hashtags + comments. Engagement bar at bottom (heart, star, comment, share).
         Carousel navigation: left/right arrows (visible on hover), or keyboard arrow keys.
      2. Full-page: when navigated directly (not recommended due to anti-bot).
    navigation_tips:
      - "PREFERRED: Open notes by clicking cards on search/profile pages (modal overlay)"
      - "PREFERRED close: use extract_page_data(command='close_note') because it handles XHS's modal quirks"
      - "Navigate carousel images: use left/right arrow keys"
      - "Scroll within the modal to see comments"
      - "Click author name/avatar to go to their profile"
      - "DO NOT reload the page to close — use close_note / X instead"
    available_extractors:
      - "extract_note_content — returns title, author, text, hashtags, date, engagement counts, image_count, type"
      - "extract_comments — returns comments with username, text, likes, replies"
      - "extract_site_entity(entity_type='note', level='lite|deep') — normalized note extraction with optional OCR / transcription"
      - "run_site_action(action='read_note', level='lite|deep') — extract the current note with less planning overhead"

  profile_page:
    name: "User Profile (个人主页)"
    url_pattern: "xiaohongshu.com/user/profile/"
    description: |
      User avatar, display name, XHS ID, bio text, follower/following/likes counts.
      Below is a grid of published notes (same card format as search results).
      SPA: scrolling loads more cards dynamically.
    navigation_tips:
      - "Scroll down to load more note cards (infinite scroll)"
      - "Click any note card to open as modal overlay"
      - "Use browser back to return to previous page"
    available_extractors:
      - "extract_profile_info — returns display_name, xhs_id, bio, followers, following, likes_and_collections"
      - "extract_profile_notes — returns grid of note cards"
      - "extract_site_entity(entity_type='author_profile') — normalized profile + visible note cards"

entities:
  note:
    name: "Note (笔记)"
    description: "A post on Xiaohongshu, either an image carousel or short video with text description."
    key_fields:
      - "title — note title"
      - "author — author display name"
      - "content — full text body"
      - "type — 'video' or 'normal' (image carousel)"
      - "likes — like count (can be string like '1.2万')"
      - "favorites — bookmark/collect count"
      - "comments_count — number of comments"
      - "hashtags — list of hashtag strings"
      - "date — publish date"
      - "image_count — number of carousel images"
      - "ip_location — author's IP location (e.g. '广东')"

  comment:
    name: "Comment (评论)"
    description: "User comment on a note."
    key_fields:
      - "username — commenter name"
      - "text — comment text"
      - "likes — comment like count"
      - "ip_location — commenter IP location"
      - "replies — list of reply comments"

  author:
    name: "Author (作者)"
    description: "A Xiaohongshu user/creator."
    key_fields:
      - "display_name — shown name"
      - "xhs_id — unique user ID"
      - "bio — profile description"
      - "followers — follower count"
      - "following — following count"
      - "likes_and_collections — total engagement received"

reporting:
  guidelines: |
    When producing a final report about Xiaohongshu content, ALWAYS include:
    1. **Screenshots**: Take a screenshot of EVERY note detail view you open.
       Embed them inline with markdown: ![note title](003_note_detail.jpg)
    2. **Links**: Include the note URL (https://www.xiaohongshu.com/explore/{note_id})
       for each note mentioned.
    3. **Rich content**: Extract and describe image content, video themes, hashtags,
       and author context — not just titles and like counts.
    4. **Comments analysis**: If the task involves understanding user sentiment,
       extract and analyze comments.
    5. **Trends and patterns**: Identify common themes, popular formats, content
       strategies across multiple notes.
    6. **Summary**: End with an overall analysis or insight, not just raw data.

navigation:
  search: |
    PREFERRED: Use run_site_action(action="search_notes", query="your query")
    or extract_page_data(command="submit_search_query", params={keyword: "your query"}).
    These are the most reliable search methods.

    FALLBACK ONLY: Click the search bar (#search-input), type your query, press Enter.

    AVOID: Direct URL navigation to search_result pages often triggers anti-bot
    protection and returns empty results.
  open_note_from_card: |
    First extract and rank visible cards with run_site_action(action="search_notes", ...)
    or extract_site_entity(entity_type="search_cards"), then either use
    run_site_action(action="read_note", index=N, level="lite|deep") or click the
    chosen note card directly on search results or profile page. NEVER navigate
    directly to /explore/{note_id}.
  close_note_modal: |
    Use extract_page_data(command="close_note") or click the X button to close the modal overlay.
    This returns to the underlying search/profile page without reloading.
  open_profile: |
    Click the author name or avatar in the note detail view to navigate
    to their profile page.
  scroll_for_more: |
    Scroll down on search results or profile pages to trigger infinite
    scroll and load more note cards.

chinese_ui_text:
  search_tabs: ["全部", "图文", "视频", "用户"]
  no_results: ["没有找到相关内容", "换个词试试", "暂无相关内容"]
  engagement_labels:
    likes: "赞"
    favorites: "收藏"
    comments: "评论"
    shares: "分享"
  count_suffixes:
    万: 10000
    w: 10000
    k: 1000
