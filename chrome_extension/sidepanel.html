<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>FlowLens</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1117;
      --panel: #151925;
      --panel-2: #1b2130;
      --border: #2a3348;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #ff7e5c;
      --ok: #34d399;
      --warn: #f59e0b;
      --err: #f87171;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: radial-gradient(circle at top, #1b2130 0%, #0f1117 45%);
      color: var(--text);
      font: 12px/1.45 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    }

    body { display: flex; flex-direction: column; }

    .topbar {
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--border);
      background: rgba(15, 17, 23, 0.9);
      backdrop-filter: blur(8px);
    }

    .title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .title .dot {
      color: var(--accent);
      margin-right: 6px;
    }

    .meta {
      display: flex;
      gap: 10px;
      margin-top: 8px;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: rgba(21, 25, 37, 0.9);
    }

    .filter-btn {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--muted);
      border-radius: 999px;
      padding: 4px 9px;
      cursor: pointer;
      font-size: 11px;
    }

    .filter-btn.active {
      color: var(--text);
      background: var(--panel-2);
      border-color: #475569;
    }

    .feed {
      flex: 1;
      overflow: auto;
      padding: 12px;
    }

    .empty {
      height: 100%;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      padding: 24px;
    }

    .entry {
      border-radius: 10px;
      border-left: 3px solid;
      padding: 10px 11px;
      margin-bottom: 8px;
      background: var(--panel);
    }

    .entry.hidden { display: none; }

    .entry-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
      min-width: 0;
    }

    .entry-time {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      min-width: 40px;
    }

    .entry-kind {
      font-size: 10px;
      font-weight: 700;
      border-radius: 4px;
      padding: 2px 6px;
      color: #0f1117;
    }

    .entry-action {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
    }

    .entry-body {
      color: var(--text);
      word-break: break-word;
    }

    .entry-detail {
      margin-top: 6px;
      font-size: 11px;
      color: var(--muted);
      white-space: pre-wrap;
    }
  </style>
</head>
  <body>
  <div class="topbar">
    <div class="title"><span class="dot">⊙</span>FlowLens Activity</div>
    <div id="metaRow" class="meta">
      <span id="watchState">Watch idle</span>
      <span id="targetState">No target tab</span>
      <span id="eventCount">0 events</span>
    </div>
  </div>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="think">Think</button>
    <button class="filter-btn" data-filter="action">Action</button>
    <button class="filter-btn" data-filter="extract">Extract</button>
    <button class="filter-btn" data-filter="result">Result</button>
    <button class="filter-btn" data-filter="warning">Warning</button>
    <button class="filter-btn" data-filter="error">Error</button>
  </div>

  <div id="feed" class="feed">
    <div class="empty">Start a FlowLens task to stream agent activity here.</div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
