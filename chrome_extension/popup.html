<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 360px; padding: 16px; font-family: -apple-system, sans-serif; font-size: 13px; }
    h3 { color: #ff2442; margin: 0 0 12px; }
    label { display: block; margin: 8px 0 4px; font-weight: 600; }
    input, textarea { width: 100%; padding: 6px 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
    textarea { height: 48px; resize: vertical; }
    button { background: #ff2442; color: #fff; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin-top: 12px; width: 100%; font-size: 14px; }
    button:disabled { background: #ccc; }
    #status { margin-top: 10px; padding: 8px; background: #f5f5f5; border-radius: 4px; max-height: 200px; overflow-y: auto; font-size: 11px; white-space: pre-wrap; display: none; }
    .settings { border-top: 1px solid #eee; margin-top: 12px; padding-top: 8px; }
    .settings summary { cursor: pointer; color: #666; font-size: 12px; }
  </style>
</head>
<body>
  <h3>XHS Research Agent</h3>

  <label>研究主题</label>
  <input id="topic" placeholder="例：2025春季露营装备趋势">

  <label>关键词 (可选, 逗号分隔)</label>
  <input id="keywords" placeholder="自动生成，或手动输入：露营装备推荐, 露营好物">

  <button id="start">开始研究</button>
  <div id="status"></div>

  <details class="settings">
    <summary>设置</summary>
    <label>Anthropic API Key</label>
    <input id="apiKey" type="password" placeholder="sk-ant-...">
    <button id="saveKey" style="background:#333;margin-top:6px;">保存</button>
  </details>

  <script src="popup.js"></script>
</body>
</html>
